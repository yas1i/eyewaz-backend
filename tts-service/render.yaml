# Render blueprint for the EYEWAZ self-hosted Urdu TTS engine.
# Deploy: Render Dashboard → New → Web Service → "Deploy an existing image"
#   Image URL: docker.io/aluminur/eyewaz-tts:latest
#   Instance:  Standard or larger (needs >= 2 GB RAM for torch + the model)
#   Health check path: /healthz
# Then set SELF_HOST_TTS_URL=https://<this-service>.onrender.com on the EYEWAZ
# backend and pick "Urdu — open-source (free)" in the dialect picker.
services:
  - type: web
    name: eyewaz-tts
    runtime: image
    image:
      url: docker.io/aluminur/eyewaz-tts:latest
    plan: standard            # >= 2 GB RAM; do NOT use the 512 MB free/starter tier
    healthCheckPath: /healthz
    autoDeploy: false
